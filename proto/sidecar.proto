syntax = "proto3";

package sidecar;

// ─── Embedding Service ───────────────────────────────────────────────────────

service EmbeddingService {
  // Embed a single text into a vector.
  rpc Embed (EmbedRequest) returns (EmbedResponse);
  // Embed a batch of texts into vectors.
  rpc EmbedBatch (EmbedBatchRequest) returns (EmbedBatchResponse);
  // Health check returning model info.
  rpc Health (HealthRequest) returns (HealthResponse);
}

message EmbedRequest {
  string text = 1;
}

message EmbedResponse {
  repeated float embedding = 1;
  int32 dimension = 2;
}

message EmbedBatchRequest {
  repeated string texts = 1;
}

message EmbedBatchResponse {
  repeated Embedding embeddings = 1;
  int32 dimension = 2;
}

message Embedding {
  repeated float values = 1;
}

message HealthRequest {}

message HealthResponse {
  string model_name = 1;
  int32 dimension = 2;
  bool ready = 3;
}

// ─── Clustering Service ──────────────────────────────────────────────────────

service ClusteringService {
  // Cluster embeddings using HDBSCAN.
  rpc Cluster (ClusterRequest) returns (ClusterResponse);
  // Project high-dimensional centroids to 2D positions via UMAP.
  rpc ProjectPositions (ProjectRequest) returns (ProjectResponse);
}

message ClusterRequest {
  repeated Embedding embeddings = 1;
  repeated string ids = 2;
  int32 min_cluster_size = 3;  // default: 5
  int32 min_samples = 4;       // default: 3
}

message ClusterResponse {
  repeated int32 labels = 1;
  repeated ClusterInfo clusters = 2;
  int32 noise_count = 3;
}

message ClusterInfo {
  int32 label = 1;
  int32 size = 2;
  repeated float centroid = 3;
  repeated string member_ids = 4;
}

message ProjectRequest {
  repeated Embedding centroids = 1;
  repeated string cluster_ids = 2;
}

message ProjectResponse {
  repeated Position2D positions = 1;
}

message Position2D {
  string cluster_id = 1;
  float x = 2;
  float y = 3;
}

// ─── Thread Detection Service ────────────────────────────────────────────────

service ThreadService {
  // Detect threads between clusters based on centroid similarity.
  rpc DetectThreads (ThreadRequest) returns (ThreadResponse);
}

message ThreadRequest {
  repeated ClusterCentroid centroids = 1;
  float similarity_threshold = 2;  // default: 0.65
  int32 max_threads = 3;           // default: 50
}

message ThreadResponse {
  repeated Thread threads = 1;
}

message ClusterCentroid {
  string cluster_id = 1;
  repeated float centroid = 2;
  string label = 3;
}

message Thread {
  string source_cluster_id = 1;
  string target_cluster_id = 2;
  float similarity = 3;
  string suggested_label = 4;
}
